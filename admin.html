<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codebyte Admin | Vizual Monitorinq</title>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --text: #f1f5f9;
            --success: #10b981;
            --busy: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .days-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            align-items: flex-start;
        }

        .day-column {
            background: var(--card);
            border-radius: 16px;
            min-width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .day-header {
            background: var(--primary);
            padding: 15px;
            border-radius: 16px 16px 0 0;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
        }

        .time-slot {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .time-label {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .voter-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 20px;
        }

        .voter-name {
            background: var(--success);
            color: white;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            animation: fadeIn 0.3s ease;
        }

        .no-voters {
            color: var(--busy);
            font-size: 11px;
            font-style: italic;
        }

        .slot-active {
            background: rgba(16, 185, 129, 0.05);
        }

        .slot-full {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid #f59e0b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            height: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>

<body>


    <div id="board" class="days-container">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDjL5wc1DMgTbYAp4370hIoTy6IWyWUqk",
            databaseURL: "https://team-time-6e775-default-rtdb.firebaseio.com/",
            projectId: "team-time-6e775",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const days = ["B.e", "Ç.a", "Çər", "C.a", "Cüm", "Şən"];
        const hours = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];

        function updateBoard() {
            db.ref('users').on('value', (snap) => {
                const data = snap.val() || {};
                const board = document.getElementById('board');
                board.innerHTML = "";

                const userCount = Object.keys(data).length;

                days.forEach(day => {
                    let dayHtml = `
                        <div class="day-column">
                            <div class="day-header">${day}</div>
                    `;

                    hours.forEach(hour => {
                        const slotId = `${day}-${hour}`;
                        let voters = [];

                        Object.keys(data).forEach(user => {
                            if (data[user].times && data[user].times.includes(slotId)) {
                                voters.push(user);
                            }
                        });

                        const isFull = voters.length > 0 && voters.length === userCount;
                        const isActive = voters.length > 0;

                        dayHtml += `
                            <div class="time-slot ${isFull ? 'slot-full' : (isActive ? 'slot-active' : '')}">
                                <div class="time-label">
                                    <span>${hour}</span>
                                    <small style="color: ${isFull ? '#f59e0b' : 'inherit'}">${voters.length} nəfər</small>
                                </div>
                                <div class="voter-list">
                                    ${voters.length > 0
                                ? voters.map(v => `<span class="voter-name">${v}</span>`).join('')
                                : '<span class="no-voters">Heç kim</span>'}
                                </div>
                            </div>
                        `;
                    });

                    dayHtml += `</div>`;
                    board.innerHTML += dayHtml;
                });
            });
        }

        updateBoard();
    </script>
</body>

</html>
